# Machine-specific PostgreSQL overrides
#
# This file is copied to `local/postgres.conf` and included after:
# 1. Each version's stock `postgresql.conf` (initdb base, in the data dir)
# 2. Repo-wide overrides from `postgres/overrides.conf`
#
# Put only per-machine settings here. PostgreSQL uses last-assignment-wins,
# so anything set here overrides the repo-wide values above.

# Example: give a beefier machine more connections than the repo default
# max_connections = 400

# Example: tune memory for this machine's RAM (change requires restart)
# shared_buffers = 2GB
# effective_cache_size = 6GB

# Example: more aggressive logging while debugging
# log_min_duration_statement = 200
