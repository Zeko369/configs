# Machine-specific Valkey overrides
#
# This file is copied to `local/valkey.conf` and included after:
# 1. Homebrew's stock Valkey config
# 2. Repo-wide overrides from `valkey/overrides.conf`
#
# Put only per-machine settings here.

# Example: give this machine a smaller memory ceiling
# maxmemory 2gb

# Example: customize eviction behavior
# maxmemory-policy allkeys-lru

# Example: bind an extra interface on a trusted network
# bind 127.0.0.1 ::1 192.168.1.50
