# Starship config - candy theme style
# Docs: https://starship.rs/config/

# Timeout for commands (don't hang on slow git repos)
command_timeout = 500

format = """
$username\
${env_var.STARSHIP_HOST}\
$time\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

# Disabled for now - uncomment to enable:
# $ruby\
# $nodejs\
# $rust\
# $golang\
# $python\
# $battery\

[username]
style_user = "bold cyan"
style_root = "bold red"
format = "[$user]($style)@"
show_always = true

[env_var.STARSHIP_HOST]
format = "[$env_value]($style) "
style = "bold cyan"
variable = "STARSHIP_HOST"

[time]
disabled = false
format = "[\\[$time\\]]($style) "
style = "bold yellow"
time_format = "%H:%M:%S"

[directory]
format = "[\\[$path\\]]($style) "
style = "bold cyan"
truncation_length = 5
truncate_to_repo = false
home_symbol = "~"
truncation_symbol = ".../"

[git_branch]
format = "[\\[$branch\\]]($style) "
style = "bold yellow"

[git_state]
format = "[\\($state( $progress_current/$progress_total)\\)]($style) "
style = "bold yellow"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

[git_status]
format = "([\\[$all_status$ahead_behind\\]]($style) )"
style = "bold red"
conflicted = "=${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"
renamed = "»${count}"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold yellow"
show_notifications = false

[character]
success_symbol = "[→ %](bold green)"
error_symbol = "[→ %](bold red)"

[battery]
full_symbol = "🔋"
charging_symbol = "⚡"
discharging_symbol = "🔋"
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"
discharging_symbol = ""
charging_symbol = "⚡"

# Language versions - show when in project
[ruby]
format = "[\\[$symbol$version\\]]($style) "
symbol = "💎"
detect_files = ["Gemfile", ".ruby-version", "Rakefile"]
detect_extensions = ["rb"]
style = "bold red"

[nodejs]
format = "[\\[$symbol$version\\]]($style) "
symbol = "⬢ "
detect_files = ["package.json", ".nvmrc", ".node-version"]
detect_extensions = ["js", "ts", "mjs", "cjs"]
style = "bold green"

[rust]
format = "[\\[$symbol$version\\]]($style) "
symbol = "🦀"
style = "bold #f74c00"

[golang]
format = "[\\[$symbol$version\\]]($style) "
symbol = "🐹"
style = "bold cyan"

[python]
format = "[\\[$symbol$version\\]]($style) "
symbol = "🐍"
style = "bold yellow"

# Disabled - using env_var instead
[hostname]
disabled = true
