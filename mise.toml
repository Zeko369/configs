# ============================================
# Global mise configuration
# Project-specific versions override these
# ============================================

[env]
# Enable YJIT for Ruby (faster)
RUBY_CONFIGURE_OPTS = "--enable-yjit"

# ============================================
# Runtimes - always install latest
# ============================================
[tools]
bun = "latest"
node = "latest"
ruby = "latest"
python = "latest"
rust = "stable"

# ============================================
# Global npm packages
# ============================================
"npm:@antfu/ni" = "latest"                       # Unified package manager (ni, nr, nx)
"npm:opencode-ai" = "latest"                     # OpenCode CLI
"npm:vercel" = "latest"                          # Vercel CLI
"npm:btca" = "latest"                            # BTCA CLI
"npm:@earendil-works/pi-coding-agent" = "latest" # pi
"npm:@openai/codex" = "latest"                   # OpenAI Codex CLI (npm tracks releases ahead of the brew cask)
"npm:@railway/cli" = "latest"                    # Railway.app CLI
"npm:@withgraphite/graphite-cli" = "stable"      # Graphite CLI (gt) — stacked PRs
"npm:agent-browser" = "latest"                   # Chrome automation

# ============================================
# Python tools via uv/pipx
# ============================================
uv = "latest"
"pipx:claude-monitor" = "latest"
"pipx:wakatime" = "latest"                       # Coding time tracker

# ============================================
# CLI tools (prebuilt binaries)
# ============================================
"github:Zeko369/overmind" = "2.5.2"              # Procfile manager — patched fork (tmux socket-name-length + .overmind.sock cleanup); DarthSim/overmind#204 unmerged

# ============================================
# Settings
# ============================================
[settings]
experimental = true
task_run_auto_install = false

# Auto-create venvs with uv
python.uv_venv_auto = true

# Read .ruby-version, .node-version files
idiomatic_version_file_enable_tools = ["ruby", "node", "python", "bun"]

# Use bun for npm packages (faster)
[settings.npm]
bun = true
