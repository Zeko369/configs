# Repo-managed Valkey config for Homebrew on macOS.
#
# Homebrew's service runs with its working directory set to `$(brew --prefix)/var`,
# so the relative `pidfile` and `dir` paths below work on both Apple Silicon and
# Intel macOS without hard-coding `/opt/homebrew` or `/usr/local`.

bind 127.0.0.1 ::1
protected-mode yes
port 6379

daemonize no
pidfile run/valkey.pid
loglevel notice
logfile ""

dir db/valkey/
dbfilename dump.rdb
save 3600 1 300 100 60 10000
appendonly no
