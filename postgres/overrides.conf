# Repo-wide PostgreSQL overrides.
#
# Each version's stock `postgresql.conf` (generated by initdb in the data dir)
# is parsed first; `install.sh` appends an include of this file at the end.
# PostgreSQL uses last-assignment-wins, so settings here override the defaults
# above while leaving the initdb base untouched for clean upgrades.
#
# Keep this small and machine-agnostic. Put per-machine tuning in
# `local/postgres.conf` instead (it is included after this file).

max_connections = 200			# bumped from the default of 100 (change requires restart)
